<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Timer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/1e218c9a2c.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="background">
         <div id="initialText" class="container">
        <h1>Kindly Type your DOB Here!</h1>   
      </div>
       <div id="AfterDOBText" class="container">
       <div class="center">
         <h1>How Much Life journey Covered,Till Now </h1> 
        <div class="time-Container">
            <h2>
                <div id="years">0</div>
                Years
            </h2>
             <h2>
                <div id="months">0</div>
                Months
            </h2>
             <h2>
                <div id="days">0</div>
                Days
            </h2>
             <h2>
                <div id="hours">0</div>
                Hours
            </h2>
             <h2>
                <div id="minutes">0</div>
                Minutes
            </h2>
             <h2>
                <div id="seconds">0</div>
                Seconds
            </h2>
        </div> 
       </div>
      </div>


      <div class="settings">
       <i id="settingIcon" class="fa-solid fa-gear"></i>
       <div id="settingContent" class="settings-content hide">
        <input type="date" id="dob-content">
        <button id="dobbutton">Add Dob</button>
       </div>
      </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
